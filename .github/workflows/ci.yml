name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-backend:
    name: Backend — Unit + E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: storein/package-lock.json

      - name: Install dependencies
        working-directory: storein
        run: npm ci

      - name: Lint
        working-directory: storein
        run: npm run lint

      - name: Unit tests
        working-directory: storein
        run: npm run test:cov

      - name: E2E tests
        working-directory: storein
        run: npm run test:e2e -- --forceExit
        # No MongoDB/Redis service needed — MongoMemoryServer + ioredis-mock

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: storein/coverage
          flags: backend
        continue-on-error: true

  lint-frontend:
    name: Frontend — Lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: storein-admin/package-lock.json

      - name: Install admin deps
        working-directory: storein-admin
        run: npm ci

      - name: Lint admin
        working-directory: storein-admin
        run: npm run lint || true

      - name: Install front deps
        working-directory: storein-front
        run: npm ci

      - name: Lint front
        working-directory: storein-front
        run: npm run lint || true
