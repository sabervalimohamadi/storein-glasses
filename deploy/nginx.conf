# ─────────────────────────────────────────────────────────────────────────────
# Storein — Nginx Configuration
# VPS: 45.94.215.8 | Ubuntu 24.04
#
# HTTP-only (IP-based) — تا زمانی که دامنه ندارید
# وقتی دامنه خریدید، فایل nginx-domain.conf را استفاده کنید
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

server {
    listen 80;
    server_name 45.94.215.8;

    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # ── API backend (NestJS روی پورت 3001) ───────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_next_upstream       error timeout http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
        proxy_connect_timeout     5s;
        proxy_read_timeout        60s;
        proxy_send_timeout        60s;
    }

    # ── Uploaded files ────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_next_upstream       error timeout http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
        proxy_connect_timeout     5s;
        proxy_read_timeout        60s;
        proxy_send_timeout        60s;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Socket.IO ─────────────────────────────────────────────────────────────
    # proxy_next_upstream must NOT be used here — it breaks WebSocket ping/pong.
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Nuxt SSR Frontend (پورت 3000) ────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Admin panel (پورت 4000) ───────────────────────────────────────────────────
server {
    listen 4000;
    server_name 45.94.215.8;

    client_max_body_size 10M;

    # WebSocket upgrade for socket.io — must come before catch-all
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
