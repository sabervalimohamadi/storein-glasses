# ─────────────────────────────────────────────────────────────────────────────
# Storein — Nginx Config
# Copy to: /etc/nginx/sites-available/storein
# Enable:  ln -s /etc/nginx/sites-available/storein /etc/nginx/sites-enabled/
# Replace YOUR_VPS_IP with your actual VPS IP address (or domain later)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_VPS_IP;

    client_max_body_size 10M;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Uploaded files ────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=604800";
    }

    # ── Socket.IO (WebSocket) ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass             http://127.0.0.1:3001;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── Nuxt SSR Frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Admin panel — accessible at http://YOUR_VPS_IP:4000 ──────────────────────
# (Direct Express server, no Nginx proxy needed)
# When you add a domain, replace above with:
#   server_name storein.ir www.storein.ir;
# And add a second server block:
#   server { listen 80; server_name admin.storein.ir; location / { proxy_pass http://127.0.0.1:4000; ... } }
