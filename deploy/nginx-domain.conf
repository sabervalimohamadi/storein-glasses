# ─────────────────────────────────────────────────────────────────────────────
# Storein — Nginx with Domain + SSL
# استفاده: وقتی دامنه خریدی
# مراحل:
#   1. apt install certbot python3-certbot-nginx
#   2. cp deploy/nginx-domain.conf /etc/nginx/sites-available/storein
#   3. sed -i 's/storein.ir/YOUR_DOMAIN/g' /etc/nginx/sites-available/storein
#   4. ln -s /etc/nginx/sites-available/storein /etc/nginx/sites-enabled/
#   5. certbot --nginx -d storein.ir -d www.storein.ir
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_ssl:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=gen_ssl:10m rate=60r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name storein.ir www.storein.ir;
    return 301 https://storein.ir$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    server_name www.storein.ir;
    ssl_certificate     /etc/letsencrypt/live/storein.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storein.ir/privkey.pem;
    return 301 https://storein.ir$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    server_name storein.ir;

    ssl_certificate     /etc/letsencrypt/live/storein.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storein.ir/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    client_max_body_size 10M;

    location /api/ {
        limit_req zone=api_ssl burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    location / {
        limit_req zone=gen_ssl burst=50 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# Admin panel
server {
    listen 443 ssl http2;
    server_name admin.storein.ir;
    ssl_certificate     /etc/letsencrypt/live/storein.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storein.ir/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
